{% if S_DISPLAY_OCCURRING_EVENTS and S_HAS_OCCURRING_EVENTS %}
<div class="panel">
	<div class="inner">
		<div class="content">
			<h3><i class="icon fa-clock-o fa-fw" aria-hidden="true"></i> {{ lang('HAPPENING_NOW') }}</h3>
			<p>
				{% for event in loops.occurring_events %}
				{% if not loop.first %} &bull; {% endif %}
				<a href="{{ event.U_VIEW }}">{{ event.TITLE }}</a>
				{% endfor %}
			</p>
		</div>
	</div>
</div>
<br>
{% endif %}
