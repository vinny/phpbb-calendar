<!-- INCLUDE overall_header.html -->

<script src="{ROOT_PATH}ext/vinny/calendar/assets/fullcalendar/dist/index.global.min.js"></script>

<!-- IF S_FC_LOCALE != 'en' -->
<script src="{ROOT_PATH}ext/vinny/calendar/assets/fullcalendar/packages/core/locales/{S_FC_LOCALE}.global.min.js"></script>
<!-- ENDIF -->

<div class="calendar-layout">
	<div class="calendar-main">
		<div class="inner">
			<div class="action-bar bar-top">
				<div class="topic-actions">
						<!-- IF U_CREATE_EVENT -->
						<a class="button button-primary" href="{U_CREATE_EVENT}">
							<i class="icon fa-plus fa-fw" aria-hidden="true"></i><span>{L_EVENT_CREATE}</span>
						</a>
						<!-- ENDIF -->
						<!-- IF S_USER_LOGGED_IN and not S_IS_BOT -->
						<a class="button button-secondary" href="{U_MY_EVENTS}">{L_MY_EVENTS}</a>
						<a class="button button-secondary" href="{U_MY_RSVPS}">{L_MY_RSVPS}</a>
						<!-- ENDIF -->
						<a class="button button-secondary" href="{U_VIEW_ALL}">{L_COMING_UP}</a>
				</div>
			</div>
			<div class="calendar-wrapper">
				<div id="calendar"></div>
			</div>
			<div class="action-bar bar-bottom">
				<div class="topic-actions calendar-bottom-actions">
					<!-- IF S_FEED_ENABLED -->
					<a class="button button-icon-only" href="{U_FEED_EVENTS}" title="{L_RSS_FEED}">
						<i class="icon fa-rss fa-fw" aria-hidden="true"></i>{L_RSS_FEED}
					</a>
					<!-- ENDIF -->
					<a class="button button-icon-only" href="{U_ICAL}" title="{L_EXPORT_ICS}">
						<i class="icon fa-download fa-fw" aria-hidden="true"></i>{L_EXPORT_ICS}
					</a>
				</div>
			</div>
	</div>
	</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
	var calendarEl = document.getElementById('calendar');
	var calendar = new FullCalendar.Calendar(calendarEl, {
		initialView: 'dayGridMonth',
		locale: '{S_FC_LOCALE}',
		themeSystem: 'standard',
		navLinks: false,
		noEventsText: '{LA_NO_EVENTS}',
		validRange: {
			start: new Date().toISOString().split('T')[0]
		},
		eventTimeFormat: <!-- IF S_FC_TIME_FORMAT eq '12' -->{
			hour: 'numeric',
			minute: '2-digit',
			hour12: true
		}<!-- ELSE -->{
			hour: '2-digit',
			minute: '2-digit',
			hour12: false
		}<!-- ENDIF -->,
		slotLabelFormat: <!-- IF S_FC_TIME_FORMAT eq '12' -->{
			hour: 'numeric',
			minute: '2-digit',
			omitZeroMinute: false,
			hour12: true
		}<!-- ELSE -->{
			hour: '2-digit',
			minute: '2-digit',
			hour12: false
		}<!-- ENDIF -->,
		headerToolbar: {
			start: 'title',
			left: 'prev,next today',
			center: '',
			right: 'dayGridMonth,listMonth'
		},
		events: <!-- IF CALENDAR_EVENTS_JSON -->{CALENDAR_EVENTS_JSON}<!-- ELSE -->[]<!-- ENDIF -->,
		height: 'auto',
		aspectRatio: 1.35,
		eventContent: function (arg) {
			var viewType = arg.view.type;
			var iconClass = arg.event.extendedProps.icon || 'fa-calendar';
			var title = arg.event.title;
			var color = arg.event.backgroundColor;
			var url = arg.event.url;
			var timeText = arg.timeText;

			if (viewType.startsWith('list')) {
				return {
					html: '<a href="' + url + '" class="calendar-event-link"><i class="icon ' + iconClass + ' fa-fw" aria-hidden="true" style="color:' + color + ';"></i> ' + title + '</a>'
				};
			}

			return {
				html: '<span class="calendar-grid-event">' + (timeText ? '<strong>' + timeText + '</strong> ' : '') + '<i class="icon ' + iconClass + ' fa-fw" aria-hidden="true"></i> ' + title + '</span>'
			};
		},
		eventClick: function (info) {
			if (info.event.url) {
				window.location.href = info.event.url;
			}
		}
	});

	calendar.render();
});
</script>

<!-- INCLUDE overall_footer.html -->
