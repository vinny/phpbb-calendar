{% INCLUDE 'overall_header.html' %}

<link href="{{ ROOT_PATH }}ext/vinny/calendar/assets/flatpickr/flatpickr.min.css" rel="stylesheet">
{% if S_FP_THEME != 'default' %}
<link href="{{ ROOT_PATH }}ext/vinny/calendar/assets/flatpickr/themes/{{ S_FP_THEME }}.css" rel="stylesheet">
{% endif %}

<form id="postform" method="post" action="{{ U_ACTION }}">
	<div class="panel" id="postingbox">
		<div class="inner">
			<h2>{{ lang('EVENT_CREATE') }}</h2>

			<fieldset class="fields2">
				<dl>
					<dt><label for="event_subject">{{ lang('EVENT_TITLE') }}{{ lang('COLON') }}</label></dt>
					<dd><input type="text" name="event_subject" id="event_subject" value="{{ EVENT_SUBJECT }}" maxlength="255" class="inputbox full" required></dd>
				</dl>
				<dl>
					<dt><label for="event_category">{{ lang('CATEGORY') }}{{ lang('COLON') }}</label></dt>
					<dd>
						<select name="event_category" id="event_category">
							<option value="0">{{ lang('SELECT_CATEGORY') }}</option>
							{% for category in loops.categories %}
							<option value="{{ category.ID }}"{% if category.ID == EVENT_CATEGORY %} selected{% endif %}>{{ category.NAME }}</option>
							{% endfor %}
						</select>
					</dd>
				</dl>
				<dl>
					<dt><label for="event_start">{{ lang('EVENT_START') }}{{ lang('COLON') }}</label></dt>
					<dd><input type="text" name="event_start" id="event_start" value="{{ EVENT_START }}" class="inputbox medium flatpickr-input" required></dd>
				</dl>
				<dl>
					<dt><label for="event_end">{{ lang('EVENT_END') }}{{ lang('COLON') }}</label></dt>
					<dd><input type="text" name="event_end" id="event_end" value="{{ EVENT_END }}" class="inputbox medium flatpickr-input"></dd>
				</dl>
				<dl>
					<dt><label>{{ lang('EVENT_FORMAT') }}{{ lang('COLON') }}</label></dt>
					<dd>
						<label><input type="radio" name="event_format" value="in-person" checked> {{ lang('FORMAT_IN_PERSON') }}</label>
						<label><input type="radio" name="event_format" value="online"> {{ lang('FORMAT_ONLINE') }}</label>
					</dd>
				</dl>
				<dl id="group-location">
					<dt><label for="event_location">{{ lang('EVENT_LOCATION') }}{{ lang('COLON') }}</label></dt>
					<dd style="position: relative;" data-calendar-geo-autocomplete data-input-id="event_location" data-lat-id="event_lat" data-lng-id="event_lng" data-endpoint="{{ U_GEO_PROXY }}" data-placeholder="{{ lang('EVENT_GEO_SEARCH_PLACEHOLDER') }}">
						<input type="text" name="event_location" id="event_location" value="{{ EVENT_LOCATION }}" class="inputbox full" placeholder="{{ lang('EVENT_GEO_SEARCH_PLACEHOLDER') }}" autocomplete="off">
						<input type="hidden" name="event_lat" id="event_lat" value="{{ EVENT_LAT }}">
						<input type="hidden" name="event_lng" id="event_lng" value="{{ EVENT_LNG }}">
					</dd>
				</dl>
			</fieldset>

			<fieldset class="fields2">
				<dl>
					<dt><label for="message">{{ lang('EVENT_DESCRIPTION') }}{{ lang('COLON') }}</label></dt>
					<dd>
						{% INCLUDE 'posting_buttons.html' %}
						<textarea name="event_desc" id="message" rows="12" cols="76" class="inputbox" onselect="storeCaret(this);" onclick="storeCaret(this);" onkeyup="storeCaret(this);" onfocus="initInsertions();">{{ EVENT_DESC }}</textarea>
					</dd>
				</dl>
			</fieldset>
		</div>
	</div>

	<div class="panel bg2">
		<div class="inner">
			<fieldset class="fields2">
				<dl>
					<dt><label for="limit_registrations_enabled">{{ lang('LIMIT_REGISTRATIONS') }}{{ lang('COLON') }}</label></dt>
					<dd>
						<label><input type="checkbox" name="limit_registrations_enabled" id="limit_registrations_enabled" value="1"> </label>
						<input type="number" name="event_attendees_limit" id="limit-input" value="{{ EVENT_ATTENDEES_LIMIT }}" min="1" class="inputbox autowidth" style="display: none; margin-left: 10px;">
					</dd>
				</dl>
				<dl>
					<dt><label for="public_calendar_enabled">{{ lang('PUBLIC_CALENDAR') }}{{ lang('COLON') }}</label></dt>
					<dd>
						<label><input type="checkbox" name="public_calendar_enabled" id="public_calendar_enabled" value="1" checked> </label>
						<span class="explain">{{ lang('PUBLIC_CALENDAR_EXPLAIN') }}</span>
					</dd>
				</dl>
			</fieldset>
		</div>
	</div>

	<div class="panel bg3">
		<div class="inner">
			<fieldset class="submit-buttons">
				<input type="submit" name="submit" class="button1 default-submit-action" value="{{ lang('SUBMIT') }}">
				{{ S_FORM_TOKEN }}
			</fieldset>
		</div>
	</div>
</form>

<script src="{{ ROOT_PATH }}ext/vinny/calendar/assets/flatpickr/flatpickr.min.js"></script>
{% if S_FP_LANGUAGE != 'default' %}
<script src="{{ ROOT_PATH }}ext/vinny/calendar/assets/flatpickr/l10n/{{ S_FP_LANGUAGE }}.js"></script>
{% endif %}
<script src="{{ ROOT_PATH }}ext/vinny/calendar/assets/js/calendar_geo_autocomplete.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
	flatpickr('input.flatpickr-input', {
		enableTime: true,
		dateFormat: 'Y-m-d H:i',
		altInput: true,
		altFormat: '{{ S_FP_DATE_FORMAT|e('js') }}',
		minDate: 'today',
		time_24hr: {% if S_FP_TIME_24HR %}true{% else %}false{% endif %},
		locale: '{{ S_FP_LANGUAGE|e('js') }}' === 'default' ? 'default' : '{{ S_FP_LANGUAGE|e('js') }}',
		allowInput: false
	});

	var formatInputs = document.querySelectorAll('input[name="event_format"]');
	var locationGroup = document.getElementById('group-location');
	var locationInput = document.getElementById('event_location');
	var latInput = document.getElementById('event_lat');
	var lngInput = document.getElementById('event_lng');
	var limitToggle = document.getElementById('limit_registrations_enabled');
	var limitInput = document.getElementById('limit-input');

	function toggleLocation() {
		var selected = document.querySelector('input[name="event_format"]:checked');
		if (!selected || selected.value !== 'online') {
			locationGroup.style.display = '';
			return;
		}

		locationGroup.style.display = 'none';
		locationInput.value = '';
		latInput.value = '';
		lngInput.value = '';
	}

	function toggleLimit() {
		if (limitToggle.checked) {
			limitInput.style.display = '';
			return;
		}
		limitInput.style.display = 'none';
		limitInput.value = '';
	}

	formatInputs.forEach(function (radio) {
		radio.addEventListener('change', toggleLocation);
	});
	limitToggle.addEventListener('change', toggleLimit);

	toggleLocation();
	toggleLimit();
});

var form_name = 'postform';
var text_name = 'message';
var load_draft = false;
var upload_allowed = false;
</script>
<script src="{{ T_ASSETS_PATH }}/javascript/editor.js"></script>

{% INCLUDE 'overall_footer.html' %}
