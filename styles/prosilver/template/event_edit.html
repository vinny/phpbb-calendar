<!-- INCLUDE overall_header.html -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/styles/minimal.css">
<link href="{ROOT_PATH}ext/vinny/calendar/assets/flatpickr/flatpickr.min.css" rel="stylesheet">
<!-- IF S_FP_THEME != 'default' -->
<link href="{ROOT_PATH}ext/vinny/calendar/assets/flatpickr/themes/{S_FP_THEME}.css" rel="stylesheet">
<!-- ENDIF -->

<form id="postform" method="post" action="{U_ACTION}">
	<div class="calendar-form-layout">
		<div class="calendar-form-main">
			<div class="panel" id="postingbox">
				<div class="inner">
					<h2>{L_EDIT_EVENT}</h2>
					<fieldset class="fields2">
						<dl>
							<dt><label for="event_subject">{L_EVENT_TITLE}{L_COLON}</label></dt>
							<dd><input type="text" name="event_subject" id="event_subject" value="{EVENT_SUBJECT}" maxlength="255" class="inputbox autowidth" required></dd>
						</dl>
						<dl>
							<dt><label for="event_category">{L_CATEGORY}{L_COLON}</label></dt>
							<dd>
								<select name="event_category" id="event_category">
									<option value="0">{L_SELECT_CATEGORY}</option>
									<!-- BEGIN categories -->
									<option value="{categories.ID}"<!-- IF categories.ID == EVENT_CATEGORY --> selected<!-- ENDIF -->>{categories.NAME}</option>
									<!-- END categories -->
								</select>
							</dd>
						</dl>
						<dl>
							<dt><label for="event_start">{L_EVENT_START}{L_COLON}</label></dt>
							<dd><input type="text" name="event_start" id="event_start" value="{EVENT_START}" class="inputbox autowidth flatpickr-input" required></dd>
						</dl>
						<dl>
							<dt><label for="event_end">{L_EVENT_END}{L_COLON}</label></dt>
							<dd><input type="text" name="event_end" id="event_end" value="{EVENT_END}" class="inputbox autowidth flatpickr-input"></dd>
						</dl>
						<dl id="group-location"<!-- IF S_FORMAT_ONLINE --> style="display:none;"<!-- ENDIF -->>
							<dt><label for="event_location">{L_EVENT_LOCATION}{L_COLON}</label></dt>
							<dd>
								<div id="location-autocomplete-container" class="calendar-geo-container"></div>
								<input type="text" name="event_location" id="event_location" value="{EVENT_LOCATION}" class="inputbox full" placeholder="{L_EVENT_LOCATION_PLACEHOLDER}">
								<input type="hidden" name="event_lat" id="event_lat" value="{EVENT_LAT}">
								<input type="hidden" name="event_lng" id="event_lng" value="{EVENT_LNG}">
								<!-- IF EVENT_MAP_IMAGE_SRC -->
								<div class="calendar-map-preview">
									<img src="{ROOT_PATH}{EVENT_MAP_IMAGE_SRC}" alt="{L_MAP_PREVIEW}">
								</div>
								<!-- ENDIF -->
							</dd>
						</dl>
					</fieldset>

					<fieldset class="fields1">
						<dl>
							<dt><label for="message">{L_EVENT_DESCRIPTION}{L_COLON}</label></dt>
							<dd>
								<!-- INCLUDE posting_buttons.html -->
								<textarea name="event_desc" id="message" rows="12" cols="76" class="inputbox" onselect="storeCaret(this);" onclick="storeCaret(this);" onkeyup="storeCaret(this);" onfocus="initInsertSymbols();">{EVENT_DESC}</textarea>
							</dd>
						</dl>
					</fieldset>
				</div>
			</div>
		</div>

		<div class="calendar-form-side">
			<div class="panel bg2">
				<div class="inner">
					<h3>{L_EVENT_SETTINGS}</h3>
					<fieldset>
						<dl>
							<dt>{L_EVENT_FORMAT}{L_COLON}</dt>
							<dd>
								<label><input type="radio" name="event_format" value="in-person"<!-- IF S_FORMAT_IN_PERSON --> checked<!-- ENDIF -->> {L_FORMAT_IN_PERSON}</label><br>
								<label><input type="radio" name="event_format" value="online"<!-- IF S_FORMAT_ONLINE --> checked<!-- ENDIF -->> {L_FORMAT_ONLINE}</label>
							</dd>
						</dl>
						<dl>
							<dt><label for="limit_registrations_enabled">{L_LIMIT_REGISTRATIONS}{L_COLON}</label></dt>
							<dd>
								<label><input type="checkbox" name="limit_registrations_enabled" id="limit_registrations_enabled" value="1" onchange="toggleLimit(this)"<!-- IF S_LIMIT_ENABLED --> checked<!-- ENDIF -->> {L_YES}</label>
								<div id="limit-input-container" class="calendar-conditional"<!-- IF not S_LIMIT_ENABLED --> style="display:none;"<!-- ENDIF -->>
									<input type="number" name="event_attendees_limit" id="limit-input" value="{EVENT_ATTENDEES_LIMIT}" min="1" class="inputbox autowidth"<!-- IF not S_LIMIT_ENABLED --> disabled<!-- ENDIF -->>
								</div>
							</dd>
						</dl>
						<dl>
							<dt><label for="public_calendar_enabled">{L_PUBLIC_CALENDAR}{L_COLON}</label></dt>
							<dd>
								<label><input type="checkbox" name="public_calendar_enabled" id="public_calendar_enabled" value="1" onchange="togglePublicExplain(this)"<!-- IF S_PUBLIC_ENABLED --> checked<!-- ENDIF -->> {L_YES}</label>
								<p id="public-explain" class="calendar-help"><!-- IF S_PUBLIC_ENABLED -->{L_PUBLIC_CALENDAR_EXPLAIN}<!-- ELSE -->{L_PUBLIC_CALENDAR_PRIVATE_EXPLAIN}<!-- ENDIF --></p>
							</dd>
						</dl>
					</fieldset>
				</div>
			</div>
		</div>
	</div>

	<div class="panel bg2">
		<div class="inner">
			<fieldset class="submit-buttons">
				<input type="submit" name="submit" class="button1 default-submit-action" value="{L_SUBMIT}">
				{S_FORM_TOKEN}
			</fieldset>
		</div>
	</div>
</form>

<script>
function selectFormatState(format) {
	var locGroup = document.getElementById('group-location');
	if (format === 'online') {
		locGroup.style.display = 'none';
		document.getElementById('event_location').value = '';
		document.getElementById('event_lat').value = '';
		document.getElementById('event_lng').value = '';
		var geoInput = document.querySelector('.geoapify-autocomplete-input');
		if (geoInput) {
			geoInput.value = '';
		}
	} else {
		locGroup.style.display = '';
	}
}

function toggleLimit(checkbox) {
	var container = document.getElementById('limit-input-container');
	var input = document.getElementById('limit-input');
	container.style.display = checkbox.checked ? 'block' : 'none';
	input.disabled = !checkbox.checked;
	if (!checkbox.checked) {
		input.value = '';
	}
}

function togglePublicExplain(checkbox) {
	document.getElementById('public-explain').textContent = checkbox.checked ? "{L_PUBLIC_CALENDAR_EXPLAIN}" : "{L_PUBLIC_CALENDAR_PRIVATE_EXPLAIN}";
}

document.addEventListener('DOMContentLoaded', function () {
	document.querySelectorAll('input[name="event_format"]').forEach(function (radio) {
		radio.addEventListener('change', function () {
			selectFormatState(this.value);
		});
	});
	selectFormatState(document.querySelector('input[name="event_format"]:checked').value);
});
</script>

<script src="{ROOT_PATH}ext/vinny/calendar/assets/flatpickr/flatpickr.min.js"></script>
<!-- IF S_FP_LANGUAGE != 'default' -->
<script src="{ROOT_PATH}ext/vinny/calendar/assets/flatpickr/l10n/{S_FP_LANGUAGE}.js"></script>
<!-- ENDIF -->
<script>
document.addEventListener("DOMContentLoaded", function () {
	flatpickr("input.flatpickr-input", {
		enableTime: true,
		dateFormat: "Y-m-d H:i",
		altInput: true,
		altFormat: "{S_FP_DATE_FORMAT}",
		minDate: "today",
		time_24hr: <!-- IF S_FP_TIME_24HR -->true<!-- ELSE -->false<!-- ENDIF -->,
		locale: "{S_FP_LANGUAGE}" === 'default' ? 'default' : "{S_FP_LANGUAGE}",
		allowInput: false
	});
});
</script>

<script src="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/dist/index.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
	var container = document.getElementById('location-autocomplete-container');
	var realInput = document.getElementById('event_location');
	var latInput = document.getElementById('event_lat');
	var lngInput = document.getElementById('event_lng');
	var apiKey = '{GEOAPIFY_API_KEY}';

	if (!container || !window.autocomplete || !window.autocomplete.GeocoderAutocomplete) {
		return;
	}

	try {
		var autocomplete = new window.autocomplete.GeocoderAutocomplete(container, apiKey, {
			lang: '{VINNY_CALENDAR_MAP_LANG}',
			placeholder: '{L_EVENT_GEO_SEARCH_PLACEHOLDER}',
			limit: 5
		});

		realInput.style.display = 'none';

		if (realInput.value) {
			autocomplete.setValue(realInput.value);
		}

		autocomplete.on('select', function (location) {
			if (location && location.properties) {
				realInput.value = location.properties.formatted || realInput.value;
				latInput.value = location.properties.lat || '';
				lngInput.value = location.properties.lon || '';
			}
		});

		autocomplete.on('input', function (val) {
			realInput.value = val;
			latInput.value = '';
			lngInput.value = '';
		});
	} catch (err) {
		realInput.style.display = '';
		container.style.display = 'none';
	}
});
</script>

<script>
var form_name = 'postform';
var text_name = 'message';
var load_draft = false;
var upload_allowed = false;
</script>
<script src="{T_ASSETS_PATH}/javascript/editor.js"></script>
